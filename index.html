<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jana Gold Menu | منيو جانا جولد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d0d0e;
            --card-bg: #16161a;
            --gold-primary: #dfb76c;
            --gold-secondary: #c59b4f;
            --gold-glow: rgba(223, 183, 108, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --border-color: #2a2a30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px; /* مساحة للقائمة العائمة بالأسفل */
            background-image: radial-gradient(circle at top right, #1a150e 0%, var(--bg-color) 60%);
        }

        /* الهيدر واللوجو */
        header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--gold-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px var(--gold-glow);
            margin-bottom: 5px;
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* شريط البحث والتصفية */
        .controls-container {
            max-width: 800px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
            font-size: 18px;
        }

        /* أزرار التصنيفات */
        .categories-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 5px 10px;
            scrollbar-width: none; /* لإخفاء شريط التمرير في فايرفوكس */
        }

        .categories-tabs::-webkit-scrollbar {
            display: none; /* لإخفاء شريط التمرير في كروم */
        }

        .tab-btn {
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-main);
            white-space: nowrap;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--gold-primary);
            color: #000;
            border-color: var(--gold-primary);
            font-weight: 700;
            box-shadow: 0 4px 12px var(--gold-glow);
        }

        /* شبكة المنتجات */
        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 650px) {
            .menu-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* كارت الصنف */
        .menu-item-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .menu-item-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .item-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .item-category {
            font-size: 12px;
            color: var(--gold-primary);
            background: rgba(223, 183, 108, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .item-price {
            font-size: 20px;
            font-weight: 900;
            color: var(--gold-primary);
            white-space: nowrap;
        }

        .item-details {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        .detail-badge {
            background: #1f1f24;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a30;
        }

        /* أزرار التفاعل داخل الكارت */
        .card-actions {
            display: flex;
            gap: 10px;
            border-top: 1px solid #222226;
            padding-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-whatsapp {
            background: #128c7e;
            color: white;
        }

        .btn-whatsapp:hover {
            background: #0f7569;
        }

        .btn-copy {
            background: #2a2a30;
            color: var(--text-main);
        }

        .btn-copy:hover {
            background: #3a3a42;
            color: var(--gold-primary);
        }

        /* توست أو إشعار النسخ */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gold-primary);
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* شريط السوشيال ميديا السفلي العائم بلمسة عصرية */
        .social-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 22, 26, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-primary);
            padding: 12px 30px;
            border-radius: 40px;
            display: flex;
            gap: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .social-link {
            color: var(--text-main);
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: var(--gold-primary);
            transform: scale(1.2);
        }

        /* واجهة التحميل والأخطاء */
        .loading-status {
            text-align: center;
            padding: 50px;
            color: var(--gold-primary);
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">Jana Gold</div>
        <div class="brand-subtitle">فخامة الطعم وجودة الاختيار ✨</div>
    </header>

    <div class="controls-container">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن صنفك المفضل...">
        </div>
        <div class="categories-tabs" id="categoriesTabs">
            <button class="tab-btn active" onclick="filterCategory('all')">الكل</button>
            </div>
    </div>

    <div class="menu-container" id="menuContainer">
        <div class="loading-status">جاري تحميل منيو جانا جولد الفاخر...</div>
    </div>

    <div class="toast" id="toast">تم نسخ تفاصيل الصنف بنجاح ✨</div>

    <div class="social-bar">
        <a href="https://facebook.com/YOUR_PAGE" target="_blank" class="social-link"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="https://instagram.com/YOUR_ACCOUNT" target="_blank" class="social-link"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://wa.me/201000000000" target="_blank" class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <script>
        // ضع رابط الـ CSV الخاص بـ Google Sheets الذي استخرجته هنا:
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1v.../pub?output=csv'; 

        let menuData = [];
        let currentCategory = 'all';

        // دالة جلب البيانات من شيت جوجل
        async function fetchMenu() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                menuData = parseCSV(data);
                
                renderCategories();
                renderMenu();
            } catch (error) {
                console.error("Error fetching sheet:", error);
                document.getElementById('menuContainer').innerHTML = `<div class="loading-status" style="color:red;">عذراً، حدث خطأ في تحميل المنيو. يرجى التحقق من رابط الشيت.</div>`;
            }
        }

        // دالة معالجة وتحويل نص CSV إلى مصفوفة كائنات كود مرنة
        function parseCSV(text) {
            const lines = text.split('\n');
            const result = [];
            
            // نفترض الترتيب: التصنيف، الصنف، العبوة، الوحدة، السعر
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // التعامل مع الفواصل داخل النصوص بشكل مبسط
                const currentLine = lines[i].split(',');
                if(currentLine.length >= 5) {
                    result.push({
                        category: currentLine[0].replace(/['"]+/g, '').trim(),
                        name: currentLine[1].replace(/['"]+/g, '').trim(),
                        packaging: currentLine[2].replace(/['"]+/g, '').trim(),
                        unit: currentLine[3].replace(/['"]+/g, '').trim(),
                        price: currentLine[4].replace(/['"]+/g, '').trim()
                    });
                }
            }
            return result;
        }

        // توليد أزرار التصنيفات تلقائياً بناءً على البيانات المتوفرة في الشيت
        function renderCategories() {
            const tabsContainer = document.getElementById('categoriesTabs');
            const categories = ['all', ...new Set(menuData.map(item => item.category))];
            
            tabsContainer.innerHTML = ''; // تفريغ
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${cat === currentCategory ? 'active' : ''}`;
                btn.textContent = cat === 'all' ? 'الكل' : cat;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterCategory(cat);
                };
                tabsContainer.appendChild(btn);
            });
        }

        // تصفية بحسب القسم
        function filterCategory(category) {
            currentCategory = category;
            renderMenu();
        }

        // دالة عرض عناصر المنيو في الصفحة
        function renderMenu() {
            const container = document.getElementById('menuContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            container.innerHTML = '';
            
            const filtered = menuData.filter(item => {
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchesSearch = item.name.toLowerCase().includes(searchTerm) || item.category.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="loading-status" style="grid-column: 1/-1;">لم نجد أصنافاً تطابق بحثك..</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-item-card';
                
                // تجهيز نصوص المشاركة والنسخ
                const shareText = `براند *Jana Gold* ✨\n*الصنف:* ${item.name}\n*التصنيف:* ${item.category}\n*العبوة:* ${item.packaging} (${item.unit})\n*السعر:* ${item.price} جنيه`;
                
                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <div>
                                <h3 class="item-title">${item.name}</h3>
                                <span class="item-category">${item.category}</span>
                            </div>
                            <div class="item-price">${item.price} ج.م</div>
                        </div>
                        <div class="item-details">
                            <span class="detail-badge"><i class="fa-solid fa-box-open" style="color:var(--gold-primary);"></i> ${item.packaging}</span>
                            <span class="detail-badge"><i class="fa-solid fa-weight-scale" style="color:var(--gold-primary);"></i> ${item.unit}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn btn-copy" onclick="copyItem('${jsEscape(shareText)}')">
                            <i class="fa-regular fa-copy"></i> نسخ
                        </button>
                        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}" target="_blank" class="action-btn btn-whatsapp" style="text-decoration:none;">
                            <i class="fa-brands fa-whatsapp"></i> مشاركة
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // دالة نسخ تفاصيل الصنف بلمسة ذكية
        function copyItem(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            });
        }

        // دالة مساعدة لتفادي أخطاء النصوص المقبسة داخل أزرار الـ JavaScript
        function jsEscape(str) {
            return str.replace(/'/g, "\\'").replace(/\n/g, "\\n");
        }

        // تفعيل البحث الفوري أثناء الكتابة
        document.getElementById('searchInput').addEventListener('input', renderMenu);

        // بدء تشغيل وتغذية الصفحة بالبيانات بمجرد التحميل
        window.onload = fetchMenu;
    </script>
</body>
</html>
