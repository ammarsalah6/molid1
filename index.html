<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jana Gold Menu | منيو جانا جولد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d0d0e;
            --card-bg: #16161a;
            --gold-primary: #dfb76c;
            --gold-secondary: #c59b4f;
            --gold-glow: rgba(223, 183, 108, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --border-color: #2a2a30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 90px; /* مساحة للقائمة العائمة بالأسفل */
            background-image: radial-gradient(circle at top right, #1a150e 0%, var(--bg-color) 60%);
        }

        /* الهيدر واللوجو */
        header {
            text-align: center;
            padding: 30px 20px 20px;
        }

        .logo-wrapper {
            margin-bottom: 15px;
        }

        .brand-logo-img {
            max-width: 110px; /* يمكنك التحكم في حجم اللوجو من هنا */
            height: auto;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 4px 15px var(--gold-glow));
            border: 2px solid var(--gold-primary);
            padding: 5px;
        }

        .brand-logo {
            font-size: 30px;
            font-weight: 900;
            color: var(--gold-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px var(--gold-glow);
            margin-bottom: 5px;
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* شريط البحث والتصفية */
        .controls-container {
            max-width: 600px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
            font-size: 18px;
        }

        /* أزرار التصنيفات بشكل عمودي */
        .categories-tabs {
            display: flex;
            flex-direction: column; /* تحويلها لعمودي */
            gap: 12px;
        }

        .tab-btn {
            width: 100%;
            padding: 15px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .tab-btn::after {
            content: '\f105'; /* سهم خفيف جهة اليسار */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            transform: scaleX(-1); /* ليتناسب مع الاتجاه العربي */
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: linear-gradient(135deg, var(--gold-secondary), var(--gold-primary));
            color: #000;
            border-color: var(--gold-primary);
            font-weight: 700;
            box-shadow: 0 4px 15px var(--gold-glow);
        }

        .tab-btn.active::after, .tab-btn:hover::after {
            color: #000;
            transform: scaleX(-1) translateX(5px);
        }

        /* شبكة المنتجات */
        .menu-container {
            max-width: 800px;
            margin: 40px auto 0;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 650px) {
            .menu-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* كارت الصنف */
        .menu-item-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .menu-item-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .item-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .item-category {
            font-size: 12px;
            color: var(--gold-primary);
            background: rgba(223, 183, 108, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .item-price {
            font-size: 20px;
            font-weight: 900;
            color: var(--gold-primary);
            white-space: nowrap;
        }

        .item-details {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        .detail-badge {
            background: #1f1f24;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a30;
        }

        /* أزرار التفاعل داخل الكارت */
        .card-actions {
            display: flex;
            gap: 10px;
            border-top: 1px solid #222226;
            padding-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-whatsapp {
            background: #128c7e;
            color: white;
        }

        .btn-whatsapp:hover {
            background: #0f7569;
        }

        .btn-copy {
            background: #2a2a30;
            color: var(--text-main);
        }

        .btn-copy:hover {
            background: #3a3a42;
            color: var(--gold-primary);
        }

        /* توست أو إشعار النسخ */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gold-primary);
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* شريط السوشيال ميديا السفلي */
        .social-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 22, 26, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-primary);
            padding: 12px 30px;
            border-radius: 40px;
            display: flex;
            gap: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .social-link {
            color: var(--text-main);
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: var(--gold-primary);
            transform: scale(1.2);
        }

        .loading-status {
            text-align: center;
            padding: 30px;
            color: var(--gold-primary);
            font-size: 16px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrapper">
            <img src="logo.png" alt="Jana Gold" class="brand-logo-img" onerror="this.style.display='none'">
        </div>
        <div class="brand-logo">Jana Gold</div>
        <div class="brand-subtitle">فخامة الطعم وجودة الاختيار ✨</div>
    </header>

    <div class="controls-container">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن صنفك المفضل مباشرة...">
        </div>
        
        <div class="categories-tabs" id="categoriesTabs">
            <button class="tab-btn" id="allTabBtn" onclick="filterCategory('all')">عرض كل الأصناف</button>
            </div>
    </div>

    <div class="menu-container" id="menuContainer">
        <div class="loading-status" style="color: var(--text-muted);">جاري الاتصال بقاعدة البيانات...</div>
    </div>

    <div class="toast" id="toast">تم نسخ تفاصيل الصنف بنجاح ✨</div>

    <div class="social-bar">
        <a href="https://facebook.com/YOUR_PAGE" target="_blank" class="social-link"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="https://instagram.com/YOUR_ACCOUNT" target="_blank" class="social-link"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://wa.me/201000000000" target="_blank" class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <script>
        // ضع رابط الـ CSV الفعال الخاص بك هنا:
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGoyAsNR0JPLb2TQNSDI55YiWFCV0b5bRAmUTsWJxLvjCL_wA-NuoK2_OCCPggtjQ7eI_1JsXxvxlX/pub?output=csv'; 

        let menuData = [];
        let currentCategory = 'initial'; // القيمة البداية تعني عدم عرض المنتجات حتى يضغط العميل

        async function fetchMenu() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const arrayBuffer = await response.arrayBuffer();
                const decoder = new TextDecoder('utf-8');
                const data = decoder.decode(arrayBuffer);
                
                if (data.trim().startsWith('<!DOCTYPE') || data.trim().startsWith('<html')) {
                    throw new Error("رابط خاطئ! تأكد من نسخ رابط الـ CSV من خطوة النشر على الويب.");
                }
                
                menuData = parseCSV(data);
                renderCategories();
                renderMenu();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('menuContainer').innerHTML = `<div class="loading-status" style="color:#ff6b6b;">تأكد من تطبيق خطوات النشر بصيغة CSV بنجاح.</div>`;
            }
        }

        function parseCSV(text) {
            const lines = text.split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const currentLine = lines[i].split(',');
                if(currentLine.length >= 5) {
                    result.push({
                        category: currentLine[0].replace(/['"]+/g, '').trim(),
                        name: currentLine[1].replace(/['"]+/g, '').trim(),
                        packaging: currentLine[2].replace(/['"]+/g, '').trim(),
                        unit: currentLine[3].replace(/['"]+/g, '').trim(),
                        price: currentLine[4].replace(/['"]+/g, '').trim()
                    });
                }
            }
            return result;
        }

        function renderCategories() {
            const tabsContainer = document.getElementById('categoriesTabs');
            const uniqueCategories = [...new Set(menuData.map(item => item.category))];
            
            // نترك زر الكل الأساسي ونضيف البقية تحته عمودياً
            tabsContainer.innerHTML = `<button class="tab-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="filterCategory('all')">✨ عرض كل المنتجات المعروضة</button>`;
            
            uniqueCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${cat === currentCategory ? 'active' : ''}`;
                btn.innerHTML = `<span><i class="fa-solid fa-folder-open" style="color:var(--gold-primary); margin-left:10px;"></i> ${cat}</span>`;
                btn.onclick = () => {
                    filterCategory(cat);
                };
                tabsContainer.appendChild(btn);
            });
        }

        function filterCategory(category) {
            currentCategory = category;
            
            // تحديث الاستايل النشط للأزرار
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                if(btn.textContent.includes(category) || (category === 'all' && btn.textContent.includes('كل المنتجات'))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            renderMenu();
            
            // حركة ذكية: الانتقال التلقائي لأسفل لرؤية الأصناف بعد الضغط (مريحة للهواتf)
            if(category !== 'initial') {
                document.getElementById('menuContainer').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            container.innerHTML = '';
            
            // إذا كانت الصفحة في البداية ولم يكتب المستخدم شيئاً في البحث، نعرض رسالة توجيهية
            if (currentCategory === 'initial' && !searchTerm) {
                container.innerHTML = `<div class="loading-status" style="color: var(--text-muted); font-size:15px; border: 1px dashed var(--border-color); border-radius:12px; background:rgba(255,255,255,0.01)">👑 مرحباً بك في جانا جولد. فضلاً اختر قسماً من الأعلى لتصفح الأسعار والأصناف المتاحة.</div>`;
                return;
            }

            // إذا كتب المستخدم في البحث، نتخطى وضع البداية ونبحث في كل البيانات تلقائياً
            let activeCat = currentCategory;
            if (searchTerm && currentCategory === 'initial') {
                activeCat = 'all';
            }

            const filtered = menuData.filter(item => {
                const matchesCategory = activeCat === 'all' || item.category === activeCat;
                const matchesSearch = item.name.toLowerCase().includes(searchTerm) || item.category.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="loading-status" style="color: var(--text-muted);">لم نجد أصنافاً تطابق بحثك الحالي..</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-item-card';
                const shareText = `براند *Jana Gold* ✨\n*الصنف:* ${item.name}\n*التصنيف:* ${item.category}\n*العبوة:* ${item.packaging} (${item.unit})\n*السعر:* ${item.price} ج.م`;
                
                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <div>
                                <h3 class="item-title">${item.name}</h3>
                                <span class="item-category">${item.category}</span>
                            </div>
                            <div class="item-price">${item.price} ج.م</div>
                        </div>
                        <div class="item-details">
                            <span class="detail-badge"><i class="fa-solid fa-box-open" style="color:var(--gold-primary);"></i> ${item.packaging}</span>
                            <span class="detail-badge"><i class="fa-solid fa-weight-scale" style="color:var(--gold-primary);"></i> ${item.unit}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn btn-copy" onclick="copyItem('${jsEscape(shareText)}')">
                            <i class="fa-regular fa-copy"></i> نسخ
                        </button>
                        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}" target="_blank" class="action-btn btn-whatsapp" style="text-decoration:none;">
                            <i class="fa-brands fa-whatsapp"></i> مشاركة
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function copyItem(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 2500);
            });
        }

        function jsEscape(str) {
            return str.replace(/'/g, "\\'").replace(/\n/g, "\\n");
        }

        // تفعيل البحث الفوري والذكي
        document.getElementById('searchInput').addEventListener('input', renderMenu);

        window.onload = fetchMenu;
    </script>
</body>
</html>
